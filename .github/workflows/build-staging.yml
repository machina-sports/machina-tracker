name: Build and Deploy Staging

on:
  push:
    tags:
      - 'v.staging-*'

env:
  AKS_CLUSTER_NAME: mks-community-cluster
  AKS_RESOURCE_GROUP: mks-community-group
  NAMESPACE: machina-frontend-boilerplate
  APP_NAME: machina-frontend-boilerplate
  DEPLOYMENT_NAME: machina-frontend-boilerplate
  CONTAINER_NAME: machina-frontend-boilerplate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Git
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create .env file
        run: |
          echo "MACHINA_API_KEY=${{ vars.MACHINA_API_KEY }}" >> .env
          echo "MACHINA_CLIENT_URL=${{ vars.MACHINA_CLIENT_URL }}" >> .env
          echo "NEXT_PUBLIC_BRAND=${{ vars.NEXT_PUBLIC_BRAND }}" >> .env
          echo "NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME }}" >> .env
          echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Get tag name as release version
        run: echo "PACKAGE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/machina-frontend-boilerplate:${{ env.PACKAGE_VERSION }}
            ${{ secrets.REGISTRY_URL }}/machina-frontend-boilerplate:staging-latest

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}

      - name: Deploy to AKS
        run: |
          # Replace placeholder in deployment.yaml with actual image
          sed -i "s|REPLACE_WITH_REGISTRY_URL|${{ secrets.REGISTRY_URL }}|g" k8s/deployment.yaml
          sed -i "s|:latest|:${{ env.PACKAGE_VERSION }}|g" k8s/deployment.yaml

          # Apply Kubernetes manifests (creates or updates resources)
          kubectl apply -f k8s/deployment.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/service.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/ingress.yaml -n ${{ env.NAMESPACE }}

          # Delete old pods to force immediate rollout
          kubectl delete pods -l app=${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} --field-selector=status.phase=Running --grace-period=0 --force 2>/dev/null || true

          # Wait for rollout to complete (with timeout)
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Post Login to Azure
        if: always()
        run: |
          echo "Post job cleanup."
          echo "Clearing azure cli accounts from the local cache."
          az account clear
